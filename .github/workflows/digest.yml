name: 기린 데일리 다이제스트

on:
  schedule:
    # KST 09:00 = UTC 00:00 (풀 다이제스트)
    # KST 12:00 = UTC 03:00 (diff)
    # KST 15:00 = UTC 06:00 (diff)
    # KST 18:00 = UTC 09:00 (diff)
    - cron: "0 0,3,6,9 * * *"
  workflow_dispatch:
    inputs:
      force_full:
        description: "풀 다이제스트 강제 발송 (diff 무시)"
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # state/previous_state.json commit용
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 한국어 폰트 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          fc-cache -fv
          rm -rf ~/.cache/matplotlib

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 모드 결정
        id: mode
        run: |
          # UTC 0시(=KST 9시) 또는 수동 force_full=true → 풀 다이제스트
          UTC_HOUR=$(date -u +%-H)
          if [ "${{ github.event.inputs.force_full }}" = "true" ] || [ "$UTC_HOUR" = "0" ]; then
            echo "args=--force-full" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: 봇 실행
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_MILESTONE_DS_ID: ${{ secrets.NOTION_MILESTONE_DS_ID }}
          NOTION_COMMERCE_DS_ID: ${{ secrets.NOTION_COMMERCE_DS_ID }}
        run: python main.py ${{ steps.mode.outputs.args }}

      - name: state 커밋
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "chore: state 업데이트 [skip ci]"
            git push
          fi
